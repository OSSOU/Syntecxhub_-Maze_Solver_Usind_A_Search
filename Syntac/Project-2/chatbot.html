<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXIOM — Rule-Based Chatbot</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,600;0,700;1,400&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

:root {
  --bg:         #0c0e0a;
  --bg2:        #111410;
  --surface:    #161a12;
  --border:     #1e2419;
  --border2:    #2a3222;
  --green:      #7fff4f;
  --green-dim:  #3d7a20;
  --green-glow: rgba(127,255,79,0.12);
  --amber:      #ffb740;
  --amber-dim:  #7a5510;
  --red:        #ff5555;
  --cyan:       #4fffdf;
  --blue:       #5599ff;
  --text:       #9eb882;
  --text-dim:   #3d4f30;
  --text-hi:    #cce8aa;
  --text-ghost: #2a3520;
  --cursor:     #7fff4f;
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  overflow: hidden;
}

/* ── CRT scanlines overlay ── */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.07) 3px,
    rgba(0,0,0,0.07) 4px
  );
  pointer-events: none;
  z-index: 1000;
}

/* ── vignette ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.6) 100%);
  pointer-events: none;
  z-index: 999;
}

.shell {
  display: grid;
  grid-template-columns: 1fr 300px;
  grid-template-rows: auto 1fr auto;
  height: 100vh;
  max-width: 1200px;
  margin: 0 auto;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
}

/* ── HEADER ── */
.header {
  grid-column: 1 / -1;
  border-bottom: 1px solid var(--border2);
  padding: 0 24px;
  display: flex;
  align-items: center;
  height: 52px;
  gap: 16px;
  background: var(--bg2);
  position: relative;
  overflow: hidden;
}

.header::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--green-dim), transparent);
}

.logo-group {
  display: flex;
  align-items: baseline;
  gap: 10px;
}

.logo {
  font-size: 18px;
  font-weight: 700;
  color: var(--green);
  letter-spacing: 0.15em;
  text-shadow: 0 0 20px rgba(127,255,79,0.5);
}

.logo-sub {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.header-pills {
  margin-left: auto;
  display: flex;
  gap: 8px;
  align-items: center;
}

.pill {
  padding: 3px 10px;
  border-radius: 2px;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 600;
}

.pill-online {
  background: rgba(127,255,79,0.1);
  color: var(--green);
  border: 1px solid rgba(127,255,79,0.2);
  display: flex; align-items: center; gap: 5px;
}

.pill-online::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  animation: pulse 2s infinite;
}

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.session-id {
  font-size: 10px;
  color: var(--text-dim);
  font-family: 'IBM Plex Mono', monospace;
}

/* ── CHAT AREA ── */
.chat-area {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-right: 1px solid var(--border);
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.messages::-webkit-scrollbar { width: 3px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border2); }

/* Message rows */
.msg-row {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-bottom: 16px;
  animation: msgIn 0.2s ease;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.06em;
  margin-bottom: 4px;
}

.msg-meta .who {
  font-weight: 700;
  letter-spacing: 0.12em;
}

.msg-meta .who.user  { color: var(--amber); }
.msg-meta .who.bot   { color: var(--green); }

.msg-meta .ts {
  margin-left: auto;
}

.msg-meta .intent-badge {
  padding: 1px 7px;
  border-radius: 2px;
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: rgba(85,153,255,0.1);
  color: var(--blue);
  border: 1px solid rgba(85,153,255,0.15);
}

.msg-bubble {
  padding: 10px 14px;
  border-radius: 3px;
  font-size: 13px;
  line-height: 1.65;
  max-width: 100%;
  position: relative;
  word-break: break-word;
}

/* User bubble */
.user .msg-bubble {
  background: rgba(255,183,64,0.05);
  border: 1px solid rgba(255,183,64,0.12);
  border-left: 2px solid var(--amber);
  color: #e8cfa0;
}

/* Bot bubble */
.bot .msg-bubble {
  background: rgba(127,255,79,0.03);
  border: 1px solid var(--border2);
  border-left: 2px solid var(--green-dim);
  color: var(--text-hi);
}

.bot .msg-bubble.kb-answer {
  border-left-color: var(--cyan);
  background: rgba(79,255,223,0.03);
}

.bot .msg-bubble.fallback {
  border-left-color: var(--text-dim);
  color: var(--text);
  opacity: 0.8;
}

/* KB highlight */
.kb-ref {
  display: inline-block;
  background: rgba(79,255,223,0.08);
  color: var(--cyan);
  border-radius: 2px;
  padding: 1px 5px;
  font-size: 11px;
  margin-right: 6px;
}

/* Typing indicator */
.typing-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.typing-dots {
  display: flex;
  gap: 3px;
  align-items: center;
}

.typing-dots span {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--green-dim);
  animation: dot-bounce 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dot-bounce {
  0%,60%,100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-4px); opacity: 1; background: var(--green); }
}

/* ── INPUT BAR ── */
.input-bar {
  border-top: 1px solid var(--border2);
  background: var(--bg2);
  padding: 14px 24px;
  display: flex;
  gap: 10px;
  align-items: center;
  flex-shrink: 0;
}

.input-prefix {
  color: var(--green);
  font-size: 14px;
  font-weight: 700;
  user-select: none;
  text-shadow: 0 0 10px rgba(127,255,79,0.4);
  flex-shrink: 0;
}

.msg-input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  color: var(--text-hi);
  caret-color: var(--cursor);
  letter-spacing: 0.02em;
}

.msg-input::placeholder { color: var(--text-ghost); }

.send-btn {
  padding: 7px 16px;
  background: none;
  border: 1px solid var(--green-dim);
  border-radius: 2px;
  color: var(--green);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
}

.send-btn:hover {
  background: rgba(127,255,79,0.08);
  border-color: var(--green);
  box-shadow: 0 0 12px rgba(127,255,79,0.15);
}

.clear-btn {
  padding: 7px 12px;
  background: none;
  border: 1px solid var(--border2);
  border-radius: 2px;
  color: var(--text-dim);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.06em;
}

.clear-btn:hover { border-color: var(--red); color: var(--red); }

/* ── SIDE PANEL ── */
.side-panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg2);
}

.side-section {
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.side-section.log-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 1;
}

.side-title {
  padding: 10px 16px;
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}

.side-title::before {
  content: '//';
  color: var(--green-dim);
}

/* Quick suggestions */
.quick-wrap {
  padding: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.quick-btn {
  background: none;
  border: 1px solid var(--border2);
  border-radius: 2px;
  padding: 4px 9px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.03em;
}

.quick-btn:hover {
  border-color: var(--green-dim);
  color: var(--green);
  background: var(--green-glow);
}

/* Intent counter */
.intent-list {
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.intent-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
}

.intent-name {
  color: var(--text-dim);
  flex: 1;
  letter-spacing: 0.04em;
}

.intent-bar-wrap {
  width: 60px;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.intent-bar {
  height: 100%;
  background: var(--green-dim);
  border-radius: 2px;
  transition: width 0.4s ease;
}

.intent-count {
  font-size: 10px;
  color: var(--text-dim);
  min-width: 20px;
  text-align: right;
}

/* Conversation log */
.conv-log {
  flex: 1;
  overflow-y: auto;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.conv-log::-webkit-scrollbar { width: 2px; }
.conv-log::-webkit-scrollbar-thumb { background: var(--border2); }

.log-entry {
  font-size: 10px;
  line-height: 1.5;
  padding: 4px 8px;
  border-radius: 2px;
  display: flex;
  gap: 6px;
  border-left: 2px solid transparent;
}

.log-entry.usr { border-left-color: var(--amber-dim); color: #8a7050; }
.log-entry.bot { border-left-color: var(--green-dim); color: var(--text-dim); }

.log-entry .log-who {
  font-weight: 700;
  flex-shrink: 0;
  font-size: 9px;
  letter-spacing: 0.08em;
  margin-top: 1px;
}
.log-entry.usr .log-who { color: var(--amber-dim); }
.log-entry.bot .log-who { color: var(--green-dim); }

.log-entry .log-text {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
}

/* Export btn */
.export-row {
  padding: 10px 12px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 6px;
}

.export-btn {
  flex: 1;
  padding: 6px;
  background: none;
  border: 1px solid var(--border2);
  border-radius: 2px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.05em;
  text-align: center;
}

.export-btn:hover { border-color: var(--cyan); color: var(--cyan); }

/* Rule match highlight in message */
.rule-match { color: var(--green); font-style: italic; }
.kb-topic { color: var(--cyan); }

/* KB tag chips */
.topic-chip {
  display: inline-block;
  background: rgba(79,255,223,0.07);
  border: 1px solid rgba(79,255,223,0.15);
  color: var(--cyan);
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 2px;
  margin: 2px;
  cursor: pointer;
  transition: background 0.15s;
}
.topic-chip:hover { background: rgba(79,255,223,0.14); }

.kb-grid {
  padding: 10px 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
</style>
</head>
<body>

<div class="shell">

  <!-- HEADER -->
  <header class="header">
    <div class="logo-group">
      <span class="logo">AXIOM</span>
      <span class="logo-sub">Rule-Based Conversational Agent v2.1</span>
    </div>
    <div class="header-pills">
      <div class="pill pill-online">Online</div>
      <div class="session-id" id="sessionId">SID: loading...</div>
    </div>
  </header>

  <!-- MAIN CHAT -->
  <main class="chat-area">
    <div class="messages" id="messages"></div>

    <div class="input-bar">
      <span class="input-prefix">&gt;_</span>
      <input class="msg-input" id="msgInput" placeholder="Type a message…" autocomplete="off" spellcheck="false">
      <button class="clear-btn" onclick="clearChat()" title="Clear history">CLR</button>
      <button class="send-btn" onclick="sendMessage()">SEND ↵</button>
    </div>
  </main>

  <!-- SIDE PANEL -->
  <aside class="side-panel">

    <!-- Quick prompts -->
    <div class="side-section">
      <div class="side-title">Quick Prompts</div>
      <div class="quick-wrap" id="quickWrap"></div>
    </div>

    <!-- Intent stats -->
    <div class="side-section">
      <div class="side-title">Intent Tracker</div>
      <div class="intent-list" id="intentList"></div>
    </div>

    <!-- KB topics -->
    <div class="side-section">
      <div class="side-title">Knowledge Base Topics</div>
      <div class="kb-grid" id="kbGrid"></div>
    </div>

    <!-- Conversation log -->
    <div class="side-section log-section">
      <div class="side-title">Session Log</div>
      <div class="conv-log" id="convLog"></div>
      <div class="export-row">
        <button class="export-btn" onclick="exportLog()">⬇ Export JSON</button>
        <button class="export-btn" onclick="exportTxt()">⬇ Export TXT</button>
      </div>
    </div>

  </aside>

</div>

<script>

//  PATTERN-MATCHING INTENT RULES
// ══════════════════════════════════════════════════════════════
const intentRules = [
  {
    intent: "greeting",
    patterns: [/^(hi|hello|hey|howdy|sup|yo|greetings|good\s+(morning|afternoon|evening|day))/i],
    responses: [

  },
  {
    intent: "small_talk_status",
    patterns: [/\b(how are you|how('s| is) it going|you okay|feeling|doing today|all good)\b/i],
    responses: [

      "Running smoothly! My rule engine is fully loaded. What's on your mind?",

      "Doing well, thanks for asking! Ready to answer questions or just chat."
    ]
  },
  {
    intent: "small_talk_name",
    patterns: [/\b(what('s| is) your name|who are you|your name|called|you called)\b/i],

  {

  {

    patterns: [/\b(what time|current time|what('s| is) the date|today('s| is) date|what day)\b/i],

    patterns: [/\b(tell me (about|more about)|learn about|info on|information on|know about)\b/i],

// ══════════════════════════════════════════════════════════════
//  CHATBOT ENGINE
// ══════════════════════════════════════════════════════════════
const intentCounts = {};
const conversationHistory = [];
let sessionId = 'SID-' + Math.random().toString(36).substr(2,8).toUpperCase();

document.getElementById('sessionId').textContent = sessionId;

function classifyIntent(input) {
  const lower = input.toLowerCase().trim();

  // Math expression
  if (/(\d+\s*[\+\-\*\/]\s*\d+)/.test(lower)) return { intent: 'math', patterns: null };

  // KB lookup intents
  const kbTrigger = /\b(what is|what's|what are|define|tell me about|learn about|explain|info on|information|how does|how do)\b/i;
  if (kbTrigger.test(lower)) {
    const topic = findKBTopic(lower);
    if (topic) return { intent: 'kb_lookup', topic };
  }

  // Direct topic mention
  const directTopic = findKBTopic(lower);
  if (directTopic && lower.split(' ').length <= 5) {
    return { intent: 'kb_lookup', topic: directTopic };
  }

  // Pattern rules (skip fallback initially)
  for (const rule of intentRules.slice(0, -1)) {
    for (const pat of rule.patterns) {
      if (pat.test(lower)) return { intent: rule.intent };
    }
  }

  return { intent: 'fallback' };
}

function findKBTopic(text) {
  const lower = text.toLowerCase();
  for (const [key, val] of Object.entries(knowledgeBase)) {
    if (lower.includes(key)) return key;
    if (lower.includes(val.topic.toLowerCase())) return key;
  }
  return null;
}

function generateResponse(input, intentObj) {
  const { intent } = intentObj;
  intentCounts[intent] = (intentCounts[intent] || 0) + 1;

  // KB lookup
  if (intent === 'kb_lookup') {
    const kb = knowledgeBase[intentObj.topic];
    const fact = kb.facts[Math.floor(Math.random() * kb.facts.length)];
    return {
      text: `<span class="kb-ref">📚 ${kb.topic}</span>${fact}`,
      type: 'kb-answer',
      matched: `KB: ${kb.topic}`
    };
  }

  // Math eval
  if (intent === 'math') {
    const expr = input.match(/[\d\s\+\-\*\/\.()]+/)?.[0]?.trim();
    try {
      // Safe eval: only digits and operators
      if (/^[\d\s\+\-\*\/\.\(\)]+$/.test(expr)) {
        const result = Function(`"use strict"; return (${expr})`)();
        return { text: `${expr.trim()} = <span class="rule-match">${result}</span>`, type: 'normal', matched: 'math' };
      }
    } catch(e) {}
    return { text: "I can evaluate simple math, but that expression stumped me.", type: 'normal', matched: 'math-error' };
  }

  // Find rule
  const rule = intentRules.find(r => r.intent === intent);
  if (!rule || !rule.responses) {
    return { text: pick(intentRules[intentRules.length-1].responses), type: 'fallback', matched: 'fallback' };
  }

  const response = pick(rule.responses);
  const text = typeof response === 'function' ? response() : response;
  return { text, type: intent === 'fallback' ? 'fallback' : 'normal', matched: intent };
}

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// ══════════════════════════════════════════════════════════════
//  UI RENDERING
// ══════════════════════════════════════════════════════════════
function renderMessage(who, text, meta = {}) {
  const messages = document.getElementById('messages');
  const ts = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});

  const row = document.createElement('div');
  row.className = `msg-row ${who}`;

  let badgeHtml = '';
  if (meta.intent && who === 'bot') {
    badgeHtml = `<span class="intent-badge">${meta.intent.replace('_',' ')}</span>`;
  }

  // Convert **bold** and \n to HTML
  const htmlText = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');

  row.innerHTML = `
    <div class="msg-meta">
      <span class="who ${who}">${who === 'user' ? '[ YOU ]' : '[ AXIOM ]'}</span>
      ${badgeHtml}
      <span class="ts">${ts}</span>
    </div>
    <div class="msg-bubble ${meta.bubbleClass || ''}">${htmlText}</div>
  `;

  messages.appendChild(row);
  messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
  const messages = document.getElementById('messages');
  const row = document.createElement('div');
  row.id = 'typing-indicator';
  row.className = 'typing-row';
  row.innerHTML = `
    <span style="color:var(--green-dim);font-size:10px">AXIOM</span>
    <div class="typing-dots"><span></span><span></span><span></span></div>
    <span style="font-size:10px">processing...</span>
  `;
  messages.appendChild(row);
  messages.scrollTop = messages.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function addToLog(who, text) {
  const log = document.getElementById('convLog');
  const entry = document.createElement('div');
  entry.className = `log-entry ${who}`;
  entry.innerHTML = `
    <span class="log-who">${who === 'usr' ? 'YOU' : 'BOT'}</span>
    <span class="log-text">${text.replace(/<[^>]*>/g,'').substring(0, 60)}${text.length > 60 ? '…' : ''}</span>
  `;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
}

function updateIntentTracker() {
  const el = document.getElementById('intentList');
  const total = Object.values(intentCounts).reduce((a,b) => a+b, 0) || 1;
  const sorted = Object.entries(intentCounts).sort((a,b) => b[1]-a[1]).slice(0, 6);

  el.innerHTML = sorted.map(([name, count]) => `
    <div class="intent-row">
      <span class="intent-name">${name.replace(/_/g,' ')}</span>
      <div class="intent-bar-wrap">
        <div class="intent-bar" style="width:${Math.round(count/total*100)}%"></div>
      </div>
      <span class="intent-count">${count}</span>
    </div>
  `).join('');

  if (sorted.length === 0) {
    el.innerHTML = '<div style="font-size:10px;color:var(--text-ghost);padding:4px">No intents yet</div>';
  }
}

// ══════════════════════════════════════════════════════════════
//  SEND MESSAGE
// ══════════════════════════════════════════════════════════════
function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  // Render user message
  renderMessage('user', text);
  addToLog('usr', text);

  // Store in history
  conversationHistory.push({ role: 'user', text, ts: new Date().toISOString() });

  // Typing delay
  showTyping();
  const delay = 400 + Math.random() * 500;

  setTimeout(() => {
    hideTyping();

    const intentObj = classifyIntent(text);
    const response  = generateResponse(text, intentObj);

    renderMessage('bot', response.text, {
      intent: intentObj.intent,
      bubbleClass: response.type === 'kb-answer' ? 'kb-answer' : response.type === 'fallback' ? 'fallback' : ''
    });

    addToLog('bot', response.text);
    conversationHistory.push({ role: 'bot', text: response.text, intent: intentObj.intent, ts: new Date().toISOString() });

    updateIntentTracker();
  }, delay);
}

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════
function clearChat() {
  document.getElementById('messages').innerHTML = '';
  document.getElementById('convLog').innerHTML = '';
  conversationHistory.length = 0;
  Object.keys(intentCounts).forEach(k => delete intentCounts[k]);
  updateIntentTracker();
  botGreet();
}

function exportLog() {
  const data = JSON.stringify({ sessionId, history: conversationHistory }, null, 2);
  download('axiom-session.json', data, 'application/json');
}

function exportTxt() {
  const lines = conversationHistory.map(m =>
    `[${m.ts}] ${m.role.toUpperCase().padEnd(5)} | ${m.text.replace(/<[^>]*>/g,'')}`
  ).join('\n');
  download('axiom-session.txt', `AXIOM Session Log\nID: ${sessionId}\n${'─'.repeat(50)}\n\n${lines}`, 'text/plain');
}

function download(filename, content, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], {type}));
  a.download = filename;
  a.click();
}

// Quick prompts
const quickPrompts = [
  "Hello!", "Tell me a joke", "What is Python?",
  "How does ML work?", "Explain Git", "What is SQL?",
  "What time is it?", "What can you do?",
  "Tell me about Linux", "What's your name?", "2 + 2 * 10"
];

function initQuickPrompts() {
  const wrap = document.getElementById('quickWrap');
  quickPrompts.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'quick-btn';
    btn.textContent = p;
    btn.onclick = () => {
      document.getElementById('msgInput').value = p;
      sendMessage();
    };
    wrap.appendChild(btn);
  });
}

function initKBGrid() {
  const grid = document.getElementById('kbGrid');
  Object.entries(knowledgeBase).forEach(([key, val]) => {
    const chip = document.createElement('span');
    chip.className = 'topic-chip';
    chip.textContent = val.topic;
    chip.onclick = () => {
      document.getElementById('msgInput').value = `Tell me about ${key}`;
      sendMessage();
    };
    grid.appendChild(chip);
  });
}

function botGreet() {
  setTimeout(() => {
    const greetings = [
      `Welcome! I'm <strong>AXIOM</strong>, a rule-based chatbot.\n\nI support:\n• Pattern-matched intents (greetings, jokes, small talk)\n• Knowledge base queries (Python, ML, Git, Linux…)\n• Math evaluation\n• Full conversation logging\n\nType <strong>help</strong> for a full overview, or click a quick prompt to get started!`,
    ];
    renderMessage('bot', greetings[0], { intent: 'system', bubbleClass: '' });
    addToLog('bot', 'AXIOM online. Session started.');
    conversationHistory.push({ role: 'bot', text: 'Session initialized.', intent: 'system', ts: new Date().toISOString() });
  }, 300);
}

// Enter key
document.getElementById('msgInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMessage();
});

// Boot
initQuickPrompts();
initKBGrid();
updateIntentTracker();
botGreet();
</script>
